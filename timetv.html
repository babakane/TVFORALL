    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #333;
        line-height: 1.6;
        min-height: 100vh;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
      }

      .header {
        text-align: center;
        margin-bottom: 40px;
        padding: 30px 0;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      }

      .header h1 {
        color: #2563eb;
        font-size: 3rem;
        margin-bottom: 15px;
        font-weight: 800;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .header p {
        color: #666;
        font-size: 1.3rem;
        font-weight: 500;
      }

      .main-layout {
        display: grid;
        grid-template-columns: 1fr 400px;
        gap: 30px;
        margin-bottom: 30px;
      }

      .content-area {
        display: flex;
        flex-direction: column;
        gap: 30px;
      }

      .categories {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 30px;
        justify-content: center;
        padding: 20px;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 15px;
        backdrop-filter: blur(10px);
      }

      .category-btn {
        padding: 12px 24px;
        border: 2px solid #e5e7eb;
        background: white;
        color: #374151;
        border-radius: 30px;
        cursor: pointer;
        font-size: 15px;
        font-weight: 600;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .category-btn:hover {
        border-color: #2563eb;
        color: #2563eb;
        transform: translateY(-2px);
        box-shadow: 0 4px 16px rgba(37, 99, 235, 0.2);
      }

      .category-btn.active {
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        color: white;
        border-color: #2563eb;
        transform: translateY(-2px);
        box-shadow: 0 4px 16px rgba(37, 99, 235, 0.3);
      }

      .search-container {
        margin-bottom: 30px;
        text-align: center;
        padding: 20px;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 15px;
        backdrop-filter: blur(10px);
      }

      .search-input {
        width: 100%;
        max-width: 500px;
        padding: 16px 24px;
        border: 2px solid #e5e7eb;
        border-radius: 30px;
        font-size: 16px;
        outline: none;
        transition: all 0.3s;
        background: white;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .search-input:focus {
        border-color: #2563eb;
        box-shadow: 0 4px 16px rgba(37, 99, 235, 0.2);
      }

      .video-container {
        margin-bottom: 30px;
        text-align: center;
        padding: 30px;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      }

      .video-player {
        width: 100%;
        max-width: 900px;
        height: 500px;
        background: #000;
        border-radius: 15px;
        margin: 0 auto;
        display: block;
        cursor: pointer;
        position: relative;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
      }

      .video-player:hover::after {
        content: "📺 Click for Live Programs";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(37, 99, 235, 0.95);
        color: white;
        padding: 12px 24px;
        border-radius: 30px;
        font-size: 16px;
        font-weight: bold;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s;
        backdrop-filter: blur(10px);
      }

      .video-player:hover::after {
        opacity: 1;
      }

      .channel-info {
        margin-top: 20px;
        padding: 20px;
        background: linear-gradient(135deg, #f8f9fa, #e9ecef);
        border-radius: 15px;
        text-align: center;
        border: 1px solid #e5e7eb;
      }

      .channel-name {
        font-size: 1.4rem;
        font-weight: bold;
        color: #2563eb;

      }

      .channel-details {
        color: #666;
        font-size: 1rem;
      }

      .channels-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        margin-top: 30px;
      }

      .channel-card {
        background: rgba(255, 255, 255, 0.95);
        border: 2px solid #e5e7eb;
        border-radius: 15px;
        padding: 20px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        text-align: center;
        position: relative;
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      }

      .channel-card:hover {
        border-color: #2563eb;
        box-shadow: 0 8px 32px rgba(37, 99, 235, 0.2);
        transform: translateY(-5px);
      }

      .channel-card.playing {
        border-color: #dc2626;
        background: linear-gradient(135deg, #fef2f2, #fee2e2);
        box-shadow: 0 8px 32px rgba(220, 38, 38, 0.2);
      }

      .channel-logo {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        background: #e5e7eb;
        margin: 0 auto 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        color: #666;
        overflow: hidden;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      }

      .channel-logo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
      }

      .channel-title {
        font-weight: bold;
        color: #333;
        margin-bottom: 8px;
        font-size: 1.1rem;
      }

      .channel-category {
        color: #666;
        font-size: 0.9rem;
        background: #f3f4f6;
        padding: 4px 12px;
        border-radius: 15px;
        display: inline-block;
        font-weight: 500;
      }

      .loading {
        text-align: center;
        padding: 40px;
        color: #666;
      }

      .error {
        text-align: center;
        padding: 40px;
        color: #dc2626;
        background: #fef2f2;
        border-radius: 10px;
        margin: 20px 0;
      }

      .controls {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 15px;
        flex-wrap: wrap;
      }

      .control-btn {
        padding: 8px 16px;
        border: 2px solid #e5e7eb;
        background: white;
        color: #374151;
        border-radius: 20px;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.2s;
      }

      .control-btn:hover {
        border-color: #2563eb;
        color: #2563eb;
      }

      .control-btn:active {
        background: #2563eb;
        color: white;
      }

      @media (max-width: 768px) {
        .container {
          padding: 15px;
        }

        .header h1 {
          font-size: 2rem;
        }

        .channels-grid {
          grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
          gap: 15px;
        }

        .video-player {

        }
      }

      .channel-card.loading {

        pointer-events: none;
      }

      .channel-card.error {
        border-color: #dc2626;
        background: #fef2f2;
      }

      .status-indicator {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #10b981;
      }

      .status-indicator.loading {
        background: #f59e0b;
        animation: pulse 1s infinite;
      }

      .status-indicator.error {
        background: #dc2626;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .video-controls {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        margin-top: 10px;
        padding: 10px;
        background: rgba(0, 0, 0, 0.1);
        border-radius: 8px;
      }

      .volume-control {

        align-items: center;
        gap: 8px;
      }

        height: 4px;

        outline: none;
        -webkit-appearance: none;
      }

        -webkit-appearance: none;
        width: 16px;
        height: 16px;
        background: #2563eb;
        border-radius: 50%;
        cursor: pointer;
      }

      .quality-info {
        font-size: 0.8rem;
        color: #666;
        margin-top: 5px;
      }

      .smart-tv-controls {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 15px;
        padding: 10px;
        background: rgba(37, 99, 235, 0.1);
        border-radius: 8px;
        flex-wrap: wrap;
      }

      .smart-btn {
        padding: 8px 12px;
        border: 2px solid #2563eb;
        background: white;
        color: #2563eb;
        border-radius: 20px;
        cursor: pointer;
        font-size: 13px;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .smart-btn:hover {
        background: #2563eb;
        color: white;
      }

      .smart-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .remote-panel {
        display: none;
        position: fixed;
        right: 20px;
        bottom: 20px;
        background: white;
        border: 2px solid #2563eb;
        border-radius: 15px;
        padding: 15px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        z-index: 1000;
        min-width: 200px;
      }

      .remote-panel.active {
        display: block;
      }

      .remote-title {
        font-size: 12px;
        font-weight: bold;
        color: #2563eb;
        margin-bottom: 10px;
        text-align: center;
      }

      .remote-buttons {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .remote-btn {

        background: #f3f4f6;

        border-radius: 8px;

        border: none;
        font-size: 18px;
        cursor: pointer;
      }

      .device-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 10px;
        max-height: 200px;
        overflow-y: auto;
        margin-top: 10px;
      }

      .device-item {
        padding: 10px;
        background: #f3f4f6;
        border: 2px solid #e5e7eb;
        border-radius: 8px;
        cursor: pointer;
        text-align: center;
        font-size: 12px;
        transition: all 0.2s;

      .device-item:hover {

        background: #dbeafe;
        color: #1e40af;
        border-radius: 4px;

        top: 8px;

        border: none;
        border-radius: 50%;
        width: 28px;
        height: 28px;
        cursor: pointer;
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        z-index: 10;
      }

      .favorite-btn:hover {
        background: rgba(255, 255, 255, 1);
        transform: scale(1.1);
      }

      .favorite-btn.active {
        color: #dc2626;
      }

      .favorites-section {
        margin-bottom: 30px;
        padding: 20px;
        background: #fef3c7;
        border-radius: 10px;
        border: 2px solid #f59e0b;
      }

      .favorites-title {
        font-size: 1.2rem;
        font-weight: bold;
        color: #92400e;
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .favorites-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 15px;
      }

      .intelligent-mode {
        position: fixed;
        top: 20px;
        right: 20px;
        background: white;
        border: 2px solid #2563eb;
        border-radius: 25px;
        padding: 8px 16px;
        cursor: pointer;
        font-size: 14px;
        z-index: 1000;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .intelligent-mode:hover {
        background: #2563eb;
        color: white;
      }

      .intelligent-mode.active {
        background: #2563eb;
        color: white;
      }

      .program-guide {
        position: fixed;
        top: 80px;
        right: 20px;
        width: 400px;
        height: calc(100vh - 100px);
        background: white;
        border: 2px solid #2563eb;
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        z-index: 999;
        display: none;
        overflow-y: auto;
      }

      .tv-screen-programs {

        left: 20px;

        max-height: 70vh;
        background: white;
        border: 2px solid #2563eb;
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        z-index: 998;
        display: none;
        overflow-y: auto;
      }

      .tv-screen-programs.active {
        display: block;
      }

      .tv-programs-header {
        font-size: 1.2rem;
        font-weight: bold;
        color: #2563eb;
        margin-bottom: 15px;
        text-align: center;
        padding-bottom: 10px;
        border-bottom: 2px solid #e5e7eb;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .close-tv-programs {
        background: none;
        border: none;
        font-size: 18px;
        cursor: pointer;
        color: #666;
        padding: 5px;

        height: 30px;

        align-items: center;
        justify-content: center;

      }

      .close-tv-programs:hover {
        background: #f3f4f6;
        color: #333;
      }

      .program-guide.active {
        display: block;
      }

      .program-guide-header {
        font-size: 1.3rem;
        font-weight: bold;
        color: #2563eb;
        margin-bottom: 20px;
        text-align: center;
        padding-bottom: 10px;
        border-bottom: 2px solid #e5e7eb;
      }

      .channel-programs {
        margin-bottom: 25px;
      }

      .channel-programs-header {
        font-size: 1.1rem;
        font-weight: bold;
        color: #333;
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .program-item {
        padding: 15px;
        background: #f8f9fa;
        border-radius: 10px;
        margin-bottom: 12px;
        cursor: pointer;
        transition: all 0.2s;
        border-left: 4px solid #2563eb;
      }

      .program-item:hover {
        background: #e3f2fd;

      .program-time {
        font-size: 0.9rem;
        color: #2563eb;
        font-weight: bold;
        margin-bottom: 6px;
      }

      .program-title {
        font-size: 1rem;
        color: #333;
        font-weight: 600;
        margin-bottom: 6px;
        line-height: 1.3;
      }

      .program-description {
        font-size: 0.85rem;
        color: #666;
        margin-bottom: 8px;
        line-height: 1.4;
      }

      .program-channel {
        font-size: 0.8rem;
        color: #666;
        background: #e5e7eb;
        padding: 3px 8px;
        border-radius: 6px;
        display: inline-block;
      }

      .program-actions {
        display: flex;
        gap: 10px;
        margin-top: 12px;
      }

      }

        background: #f59e0b;
      }

      .program-action-btn.share:hover {
        background: #d97706;
      }

      .ai-loading {
        text-align: center;
        padding: 40px;
        color: #666;
      }

      .ai-loading-spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid #e5e7eb;

        top: 20px;

      // ============ NETWORK DETECTION & ADAPTIVE MODE ============

        isOnline: navigator.onLine,

        init() {
          this.detectConnection();
          this.setupEventListeners();
          this.loadUserPreferences();

        detectConnection() {
          // Detect connection type and quality
          if ('connection' in navigator) {
            const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (connection) {
              this.connectionType = connection.effectiveType || 'unknown';
              this.networkQuality = this.assessNetworkQuality(connection);
              this.lowDataMode = this.shouldUseLowDataMode(connection);
            }
          }
          
          // Fallback detection
          if (!this.isOnline) {
            this.networkQuality = 'offline';
            this.lowDataMode = true;
          }
        },
        
        assessNetworkQuality(connection) {
          const effectiveType = connection.effectiveType || '4g';
          const downlink = connection.downlink || 10;
          const rtt = connection.rtt || 100;
          
          if (effectiveType === 'slow-2g' || effectiveType === '2g' || downlink < 0.1) {
            return 'poor';
          } else if (effectiveType === '3g' || downlink < 0.5) {
            return 'fair';
          } else if (effectiveType === '4g' || downlink > 2) {
            return 'good';
          }
          return 'unknown';
        },
        
        shouldUseLowDataMode(connection) {
          const effectiveType = connection.effectiveType || '4g';
          const saveData = connection.saveData || false;
          
          return saveData || 
                 effectiveType === 'slow-2g' || 
                 effectiveType === '2g' || 
                 this.networkQuality === 'poor';
        },
        
        setupEventListeners() {
          window.addEventListener('online', () => {
            this.isOnline = true;
            this.detectConnection();
            this.showNetworkStatus('Connected', 'success');
          });
          
          window.addEventListener('offline', () => {
            this.isOnline = false;
            this.networkQuality = 'offline';
            this.lowDataMode = true;
            this.showNetworkStatus('Offline - Using cached data', 'warning');
          });
          
          if ('connection' in navigator) {
            const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            connection.addEventListener('change', () => {
              this.detectConnection();
              this.adaptToNetworkConditions();
            });
          }
        },
        
        loadUserPreferences() {
          const savedMode = localStorage.getItem('lowDataMode');
          if (savedMode !== null) {
            this.lowDataMode = savedMode === 'true';
          }
        },
        
        toggleLowDataMode() {
          this.lowDataMode = !this.lowDataMode;
          localStorage.setItem('lowDataMode', this.lowDataMode.toString());
          this.adaptToNetworkConditions();
          this.showNetworkStatus(this.lowDataMode ? 'Low data mode enabled' : 'Full mode enabled', 'info');
          
          // Update toggle button text
          const toggle = document.getElementById('lowDataToggle');
          if (toggle) {
            toggle.textContent = this.lowDataMode ? '📊 Low Data' : '📊 Full Mode';
            toggle.classList.toggle('active', this.lowDataMode);
          }
        },
        
        adaptToNetworkConditions() {
          // Adjust video quality based on network
          this.adjustVideoQuality();
          
          // Adjust AI features based on network
          this.adjustAIFeatures();
          
          // Update UI to reflect current mode
          this.updateNetworkIndicator();
        },
        
        adjustVideoQuality() {
          const video = document.getElementById('videoPlayer');
          if (!video) return;
          
          if (this.lowDataMode || this.networkQuality === 'poor') {
            // Reduce video quality for low data mode
            video.style.maxHeight = '300px';

          } else {
            video.style.maxHeight = '500px';
          }

        adjustAIFeatures() {
          // Disable AI features in low data mode or offline
          if (!this.isOnline || this.lowDataMode) {
            // Use offline program data instead of AI
            window.useOfflineData = true;
          } else {
            window.useOfflineData = false;
          }

        updateNetworkIndicator() {
          const indicator = document.getElementById('networkIndicator');

            indicator.className = `network-indicator ${this.networkQuality}`;
            indicator.textContent = this.getNetworkStatusText();

        getNetworkStatusText() {

          const icons = {
            'good': '📶 Good',
            'fair': '📡 Fair', 
            'poor': '📱 Poor',
            'unknown': '❓ Unknown'
          };
          
          return icons[this.networkQuality] || '📶 Good';

        showNetworkStatus(message, type) {

        importantChannels: {

            });
            
            const isImportantChannel = this.isImportantChannel(channelName, category);

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${this.apiKey}`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',

              body: JSON.stringify({

                  parts: [{

                  }]
                }]
              })
            });
            
            if (!response.ok) {

            const data = await response.json();

            if (!text) {

            // Extract JSON from response

            const programs = JSON.parse(jsonMatch[0]);
            return this.processProgramsWithRealTime(programs, currentTime, isImportantChannel);

            ]
            
            Requirements:
            1. Mark the program airing at ${currentTime} with "isCurrent": true
            2. Include live news, sports events, breaking stories for important channels
            3. For sports channels: include live matches, scores, game times
            4. For news channels: include breaking news, live reports, scheduled broadcasts
            5. Start from current time and progress chronologically
            6. Make it realistic and engaging for ${category} content`;
            
          return basePrompt;
        },
        
        processProgramsWithRealTime(programs, currentTime, isImportant) {
          return programs.map((program, index) => {
            const programTime = new Date();
            const [hours, minutes] = program.time.split(':');
            programTime.setHours(parseInt(hours), parseInt(minutes), 0, 0);
            
            const isCurrent = this.isCurrentProgram(programTime, currentTime);
            const isUpcoming = programTime > currentTime && programTime.getTime() - currentTime.getTime() <= 60 * 60 * 1000; // Within 1 hour
            
            return {
              ...program,
              isCurrent,
              isUpcoming,
              status: isCurrent ? 'NOW' : isUpcoming ? 'NEXT' : 'LATER',
              timeUntilStart: this.getTimeUntilStart(programTime, currentTime),
              priority: isImportant ? 'high' : 'normal'
            };
          }).sort((a, b) => {
            // Sort by priority and time
            if (a.isCurrent !== b.isCurrent) return a.isCurrent ? -1 : 1;
            if (a.isUpcoming !== b.isUpcoming) return a.isUpcoming ? -1 : 1;
            return a.time.localeCompare(b.time);
          });
        },
        
        isCurrentProgram(programTime, currentTime) {
          const programEnd = new Date(programTime.getTime() + (program.duration || 60) * 60 * 1000);
          return currentTime >= programTime && currentTime <= programEnd;
        },
        
        getTimeUntilStart(programTime, currentTime) {
          const diff = programTime.getTime() - currentTime.getTime();
          if (diff <= 0) return 'NOW';
          
          const hours = Math.floor(diff / (1000 * 60 * 60));
          const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
          
          if (hours > 0) return `in ${hours}h ${minutes}m`;
          return `in ${minutes}m`;
        },
        
        getEnhancedFallbackPrograms(channelName, category) {
          const now = new Date();
          const isImportant = this.isImportantChannel(channelName, category);
          
          const enhancedPrograms = {
            news: [
              { time: this.getCurrentTimeSlot(now, -30), title: "Breaking News Live", description: "Live coverage of breaking news events", duration: 30, isLive: true, isCurrent: true },
              { time: this.getCurrentTimeSlot(now, 0), title: "Evening News Bulletin", description: "Comprehensive news update and analysis", duration: 60, isLive: false, isCurrent: false },
              { time: this.getCurrentTimeSlot(now, 60), title: "World Report", description: "International news and global events", duration: 30, isLive: true, isCurrent: false },
              { time: this.getCurrentTimeSlot(now, 90), title: "Business Tonight", description: "Market updates and financial news", duration: 60, isLive: false, isCurrent: false }
            ],
            sports: [
              { time: this.getCurrentTimeSlot(now, -15), title: "Live Football Match", description: "Premier League: Live match coverage", duration: 120, isLive: true, isCurrent: true },
              { time: this.getCurrentTimeSlot(now, 105), title: "Sports Center", description: "Latest sports news and highlights", duration: 60, isLive: true, isCurrent: false },
              { time: this.getCurrentTimeSlot(now, 165), title: "Match Analysis", description: "Post-match analysis and commentary", duration: 45, isLive: false, isCurrent: false }
            ],
            entertainment: [
              { time: this.getCurrentTimeSlot(now, 0), title: "Prime Time Show", description: "Popular entertainment series", duration: 60, isLive: false, isCurrent: false },
              { time: this.getCurrentTimeSlot(now, 60), title: "Late Night Talk", description: "Celebrity interviews and comedy", duration: 45, isLive: false, isCurrent: false },
              { time: this.getCurrentTimeSlot(now, 105), title: "Movie Premiere", description: "Exclusive movie presentation", duration: 120, isLive: false, isCurrent: false }
            ]
          };
          
          const programs = enhancedPrograms[category] || enhancedPrograms.entertainment;
          return this.processProgramsWithRealTime(programs, now, isImportant);
        },
        
        getCurrentTimeSlot(currentTime, minutesOffset) {
          const slot = new Date(currentTime.getTime() + minutesOffset * 60 * 1000);
          return slot.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
        }
      };

      // ============ CODEC & FORMAT DETECTION ============
      const CodecDetector = {
        detect: function (url) {
          const lower = url.toLowerCase();

          if (lower.includes(".m3u8")) {
            return {
              type: "HLS",
              codec: "H.264/AAC",
              mimeType: "application/vnd.apple.mpegurl",
            };
          }
          if (lower.includes(".mpd")) {
            return {
              type: "DASH",
              codec: "VP9/H.265/H.264",
              mimeType: "application/dash+xml",
            };
          }
          if (lower.includes(".ts") || lower.includes("mpeg")) {
            return {
              type: "MPEG-TS",
              codec: "MPEG2/H.264",
              mimeType: "video/mp2t",
            };
          }
          if (lower.includes(".mp4")) {
            return { type: "MP4", codec: "H.264/H.265", mimeType: "video/mp4" };
          }
          if (lower.includes(".mkv")) {
            return {
              type: "Matroska",
              codec: "VP9/H.265",
              mimeType: "video/x-matroska",
            };
          }

          return { type: "Unknown", codec: "Auto-detect", mimeType: "video/*" };
        },

        canPlay: function (mimeType) {
          const video = document.createElement("video");
          return video.canPlayType(mimeType) !== "";
        },
      };

      // ============ CHROMECAST SUPPORT ============
      const CastManager = {
        init: function () {
          const script = document.createElement("script");
          script.src = "https://www.gstatic.com/cv/js/sender/v1/cast_sender.js";
          script.onload = function () {
            if (window.chrome && window.chrome.cast) {
              window.chrome.cast.isAvailable = true;
              CastManager.initializeCastApi();
            }
          };
          document.head.appendChild(script);
        },

        initializeCastApi: function () {
          const sessionRequest = new window.chrome.cast.SessionRequest(
            window.chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
          );

          const apiConfig = new window.chrome.cast.ApiConfig(
            sessionRequest,
            CastManager.onSessionSuccess,
            CastManager.onSessionError,
            window.chrome.cast.AutoJoinPolicy.TAB_AND_ORIGIN_SCOPED,
          );

          window.chrome.cast.initialize(
            apiConfig,
            () => {
              updateCastButton();
            },
            CastManager.onSessionError,
          );
        },

        onSessionSuccess: function (session) {
          castSession = session;
          updateCastButton();
          console.log(
            "Connected to Chromecast device:",
            session.receiver.label,
          );

          if (activeChannel) {
            CastManager.castChannel(activeChannel);
          }
        },

        onSessionError: function (error) {
          console.log("Cast session error:", error);
        },

        castChannel: function (channel) {
          if (!castSession) return;

          const mediaRequest = new window.chrome.cast.media.MediaInfo(
            channel.url,
            CodecDetector.detect(channel.url).mimeType,
          );

          mediaRequest.metadata =
            new window.chrome.cast.media.GenericMediaMetadata();
          mediaRequest.metadata.title = channel.name;
          mediaRequest.metadata.images = channel.logo
            ? [{ url: channel.logo }]
            : [];

          castSession.loadMedia(
            mediaRequest,
            () => console.log("Media loaded on Chromecast"),
            (err) => console.log("Error casting:", err),
          );
        },

        stopCasting: function () {
          if (castSession) {
            castSession.stop(
              () => (castSession = null),
              (err) => console.log("Error stopping cast:", err),
            );
          }
        },
      };

      // ============ REMOTE CONTROL ============
      function toggleRemote() {

      function sendRemoteCommand(cmd) {
        const video = document.getElementById("videoPlayer");

        switch (cmd) {
          case "play":
            if (video.paused) video.play();
            else video.pause();
            break;
          case "volup":
            video.volume = Math.min(1, video.volume + 0.1);
            document.getElementById("volumeSlider").value = video.volume;
            updateVolumeIcon(video.volume);
            break;
          case "voldown":
            video.volume = Math.max(0, video.volume - 0.1);
            document.getElementById("volumeSlider").value = video.volume;
            updateVolumeIcon(video.volume);
            break;
          case "mute":
            video.muted = !video.muted;
            updateVolumeIcon(video.volume);
            break;
          case "fullscreen":
            toggleFullscreen();
            break;
          case "next":
            playNextChannel();
            break;
          case "prev":
            playPreviousChannel();
            break;
        }
      }

      // Keyboard shortcuts
      function handleKeyPress(e) {
        if (
          !activeChannel ||
          document.getElementById("videoContainer").style.display === "none"
        )
          return;

        switch (e.key) {
          case " ":
            e.preventDefault();
            sendRemoteCommand("play");
            break;
          case "m":
            sendRemoteCommand("mute");
            break;
          case "ArrowUp":
            e.preventDefault();
            sendRemoteCommand("volup");
            break;
          case "ArrowDown":
            e.preventDefault();
            sendRemoteCommand("voldown");
            break;
          case "ArrowRight":
            e.preventDefault();
            sendRemoteCommand("next");
            break;
          case "ArrowLeft":
            e.preventDefault();
            sendRemoteCommand("prev");
            break;
          case "f":
            sendRemoteCommand("fullscreen");
            break;
          case "r":
            toggleRemote();
            break;
        }
      }

      async function loadChannels(category) {
        const loading = document.getElementById("loading");
        const error = document.getElementById("error");
        const grid = document.getElementById("channelsGrid");

        loading.style.display = "block";
        error.style.display = "none";
        grid.innerHTML = "";

        try {
          const response = await fetch(
            `https://iptv-org.github.io/iptv/categories/${category}.m3u`,
          );
          if (!response.ok) throw new Error("Failed to fetch channels");

          const m3uContent = await response.text();
          currentChannels = parseM3U(m3uContent);

          displayChannels(currentChannels);
          
          // Update program guide if intelligent mode is active
          if (intelligentMode) {
            ProgramGuide.loadProgramsForChannels(currentChannels);
          }
        } catch (err) {
          console.error("Error loading channels:", err);
          error.style.display = "block";
        } finally {
          loading.style.display = "none";
        }
      }

      function parseM3U(content) {
        const lines = content.split("\n");
        const channels = [];
        let currentChannel = null;

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i].trim();

          if (line.startsWith("#EXTINF:")) {
            const nameMatch = line.match(/,(.+)$/);
            const logoMatch = line.match(/tvg-logo="([^"]*)"/);
            const groupMatch = line.match(/group-title="([^"]*)"/);
            const countryMatch = line.match(/tvg-country="([^"]*)"/);
            const langMatch = line.match(/tvg-language="([^"]*)"/);

            currentChannel = {
              name: nameMatch ? nameMatch[1].trim() : "Unknown Channel",
              logo: logoMatch ? logoMatch[1] : null,
              category: groupMatch ? groupMatch[1] : "General",
              country: countryMatch ? countryMatch[1] : null,
              language: langMatch ? langMatch[1] : null,
            };
          } else if (
            line.startsWith("http") &&
            !line.startsWith("#") &&
            currentChannel
          ) {
            channels.push({
              ...currentChannel,
              url: line,
            });
            currentChannel = null;
          }
        }

        return channels;
      }

              <span style="display: ${channel.logo ? "none" : "block"};">📺</span>
            </div>
            <div class="channel-title">${channel.name}</div>
            <div class="channel-category">${channel.category}</div>
            <div class="codec-badge">${codec.type}</div>
          `;
          
          grid.appendChild(card);
        });
      }

      function filterChannels() {
        const query = document
          .getElementById("searchInput")
          .value.toLowerCase();
        const filteredChannels = currentChannels.filter(
          (channel) =>
            channel.name.toLowerCase().includes(query) ||
            channel.category.toLowerCase().includes(query) ||
            (channel.country && channel.country.toLowerCase().includes(query)),
        );
        displayChannels(filteredChannels);
      }

      function playChannel(channel, index) {
        activeChannel = { ...channel, index };

        document.querySelectorAll(".channel-card").forEach((card) => {
          card.classList.remove("playing");
        });
        document
          .querySelectorAll(".channel-card")
          [index]?.classList.add("playing");

        document.getElementById("videoContainer").style.display = "block";

        document.getElementById("channelInfo").innerHTML = `
                <div class="channel-name">${channel.name}</div>
                <div class="channel-details">
                    ${channel.category}
                    ${channel.country ? ` • ${channel.country}` : ""}
                    ${channel.language ? ` • ${channel.language}` : ""}
                </div>
            `;

        // Cast if connected
        if (castSession) {
          CastManager.castChannel(channel);
        }

        loadVideo(channel.url);
        
        // Update TV screen programs if panel is open
        if (document.getElementById('tvScreenPrograms').classList.contains('active')) {
          loadCurrentChannelPrograms();
        }

        document.getElementById("videoContainer").scrollIntoView({
          behavior: "smooth",
          block: "start",
        });
      }

      async function loadVideo(url) {
        const video = document.getElementById("videoPlayer");
        const codec = CodecDetector.detect(url);
        currentStreamCodec = codec;

        document.getElementById("qualityInfo").textContent =
          `${codec.type} • ${codec.codec}`;

        if (hlsInstance) {
          hlsInstance.destroy();
          hlsInstance = null;
        }
        if (dashInstance) {
          dashInstance.destroy();
          dashInstance = null;
        }

        video.pause();
        video.currentTime = 0;

        // Try HLS with HLS.js
        if (codec.type === "HLS" && window.Hls && window.Hls.isSupported()) {
          hlsInstance = new window.Hls({
            enableWorker: true,
            lowLatencyMode: true,
            maxBufferSize: 30 * 1000 * 1000,
            maxBufferLength: 30,
          });

          hlsInstance.loadSource(url);
          hlsInstance.attachMedia(video);

          hlsInstance.on(window.Hls.Events.MANIFEST_PARSED, () => {
            video.play().catch((err) => console.log("Autoplay prevented"));
          });

          hlsInstance.on(window.Hls.Events.ERROR, (event, data) => {
            if (data.fatal) {
              console.error("HLS Error:", data);
              // Fallback to native
              video.src = url;
              video.load();
              video.play().catch((err) => console.log("Fallback play failed"));
            }
          });
        }
        // Try DASH with dash.js
        else if (codec.type === "DASH" && window.dashjs) {
          dashInstance = window.dashjs.MediaPlayer().create();
          dashInstance.initialize(video, url, true);
          dashInstance.attachView(video);
          video.play().catch((err) => console.log("Autoplay prevented"));
        }
        // Direct playback with type hints
        else {
          video.type = codec.mimeType;
          video.src = url;
          video.load();
          video.play().catch((err) => console.log("Autoplay prevented"));
        }
      }

      function closePlayer() {
        const video = document.getElementById("videoPlayer");
        const container = document.getElementById("videoContainer");

        video.pause();
        video.currentTime = 0;

        if (hlsInstance) {
          hlsInstance.destroy();
          hlsInstance = null;
        }
        if (dashInstance) {
          dashInstance.destroy();
          dashInstance = null;
        }

        container.style.display = "none";
        activeChannel = null;

        document.querySelectorAll(".channel-card").forEach((card) => {
          card.classList.remove("playing");
        });
      }

      function toggleFullscreen() {
        const video = document.getElementById("videoPlayer");

        if (document.fullscreenElement) {
          document.exitFullscreen();
        } else if (video.requestFullscreen) {
          video.requestFullscreen();
        }
      }

      // Load HLS.js and dash.js dynamically
      (function () {
        if (typeof window.Hls === "undefined") {
          const script = document.createElement("script");
          script.src = "https://cdn.jsdelivr.net/npm/hls.js@latest";
          document.head.appendChild(script);
        }

        if (typeof window.dashjs === "undefined") {
          const script = document.createElement("script");
          script.src = "https://cdn.dashjs.org/latest/dash.all.min.js";
          document.head.appendChild(script);
        }
      })();
    </script>
  </body>
</html>
